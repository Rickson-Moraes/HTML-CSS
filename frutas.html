<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Cards de Frutas</title>
    <link rel="stylesheet" href="styles (1).css" />
  </head>

  <body>
    <main>
      <h1 class="titulo">🍎 Alimentação Saudável</h1>

      <!-- GRID DE CIMA -->
      <div class="container2">
        <div class="card">
          <img
            src="https://images.tcdn.com.br/img/img_prod/450860/muda_de_maca_gala_climas_frios_ou_amenos_1m_enxertadas_566_1_20190611093558.jpg"
            alt="Maçã"
          />
          <div>
            <h2>Maçã</h2>
            <p>52 kcal</p>
          </div>
        </div>

        <div class="card">
          <img
            src="https://vallefrutas.com.br/wp-content/uploads/banana-nanica.png"
            alt="Banana"
          />
          <div>
            <h2>Banana</h2>
            <p>89 kcal</p>
          </div>
        </div>

        <div class="card">
          <img
            src="https://prezunic.vtexassets.com/arquivos/ids/181443/65678b131ef3739680761831.jpg?v=638368814312430000"
            alt="Laranja"
          />
          <div>
            <h2>Laranja</h2>
            <p>47 kcal</p>
          </div>
        </div>

        <div class="card">
          <img
            src="https://redeital.org/wp-content/uploads/2020/09/morango.jpg"
            alt="Morango"
          />
          <div>
            <h2>Morango</h2>
            <p>32 kcal</p>
          </div>
        </div>
      </div>

      <!-- DESTAQUE -->
      <div class="destaque">
        <h2>💪 Cuide do seu corpo!</h2>
        <p>Uma alimentação saudável é o primeiro passo para uma vida melhor.</p>
      </div>

      <!-- GRID DE BAIXO -->
      <div class="container">
        <div class="card">
          <img
            src="https://52586.cdn.lojaquevende.com.br/static/52586/sku/frutas-Abacaxi-1586826589955.png"
            alt="Abacaxi"
          />
          <h2>Abacaxi</h2>
          <p>50 kcal</p>
        </div>

        <div class="card">
          <img
            src="https://cdn.awsli.com.br/300x300/681/681419/produto/320247673/melancia-10-kg-0q443bthbb.jpg"
            alt="Melancia"
          />
          <h2>Melancia</h2>
          <p>30 kcal</p>
        </div>

        <div class="card">
          <img
            src="https://mondiniplantas.cdn.magazord.com.br/img/2025/04/produto/6452/uva-terci-bordo.jpg?ims=800x800"
            alt="Uva"
          />
          <h2>Uva</h2>
          <p>69 kcal</p>
        </div>

        <div class="card">
          <img
            src="https://cptstatic.s3.amazonaws.com/imagens/enviadas/materias/materia10908/cultivo-de-manga-clima-temperatura-solo-e-colheita-cpt.jpg"
            alt="Manga"
          />
          <h2>Manga</h2>
          <p>60 kcal</p>
        </div>
      </div>
    </main>
  </body>
</html>
